name: Deploy salon-app → VM (nginx)

on:
  push:
    branches: [main]
    paths:
      - 'frontend/salon-app/**'
      - '.github/workflows/deploy-salon-app.yml'
  workflow_dispatch:

env:
  APP_DIR:     frontend/salon-app
  NODE_VERSION: '20'
  DEPLOY_PATH: '/var/www/salon-app'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.APP_DIR }}/package-lock.json

      - name: Install & Build
        working-directory: ${{ env.APP_DIR }}
        run: |
          npm install
          npx ng build --configuration=production

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts
          ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null && echo "✓ Clave SSH válida"

      - name: Copiar y publicar en VM
        run: |
          scp -i ~/.ssh/deploy_key -r \
            ${{ env.APP_DIR }}/dist/salon-app/browser/ \
            ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}:/tmp/salon-deploy

          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} \
            "sudo rsync -a --delete /tmp/salon-deploy/ ${{ env.DEPLOY_PATH }}/ && \
             sudo chown -R www-data:www-data ${{ env.DEPLOY_PATH }} && \
             rm -rf /tmp/salon-deploy && \
             echo '✓ salon-app desplegada'"
