name: Deploy API → VM (systemd)

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  PROJECT_PATH:   'src/SalonPro.Host/SalonPro.Host.csproj'
  DEPLOY_PATH:    '/var/www/salonpro-api'
  SERVICE_NAME:   'salonpro-api'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish
        run: >
          dotnet publish ${{ env.PROJECT_PATH }}
          -c Release
          -o ./publish

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts
          ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null && echo "✓ Clave SSH válida"

      - name: Copiar artefactos a la VM
        run: |
          scp -i ~/.ssh/deploy_key -r \
            ./publish/ \
            ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}:/tmp/salonpro-deploy

      - name: Desplegar y reiniciar servicio
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} << 'ENDSSH'
              set -e
              sudo systemctl stop salonpro-api || true
              sudo rsync -a --delete /tmp/salonpro-deploy/ /var/www/salonpro-api/
              sudo chown -R salonpro:salonpro /var/www/salonpro-api
              sudo systemctl start salonpro-api
              sleep 3
              sudo systemctl status salonpro-api --no-pager
              rm -rf /tmp/salonpro-deploy
          ENDSSH
