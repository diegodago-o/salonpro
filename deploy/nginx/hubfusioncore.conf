# ══════════════════════════════════════════════════════════════════════
#  SalonPro — nginx config para hubfusioncore.com.co
#  Cert wildcard: /etc/letsencrypt/live/hubfusioncore.com.co/
# ══════════════════════════════════════════════════════════════════════

# ── Parámetros SSL compartidos ─────────────────────────────────────────
ssl_certificate     /etc/letsencrypt/live/hubfusioncore.com.co/fullchain.pem;
ssl_certificate_key /etc/letsencrypt/live/hubfusioncore.com.co/privkey.pem;
ssl_protocols       TLSv1.2 TLSv1.3;
ssl_ciphers         HIGH:!aNULL:!MD5;
ssl_session_cache   shared:SSL:10m;
ssl_session_timeout 10m;

# ── HTTP → HTTPS (todo) ────────────────────────────────────────────────
server {
    listen 80;
    server_name hubfusioncore.com.co *.hubfusioncore.com.co;
    return 301 https://$host$request_uri;
}

# ── API (.NET 8) ───────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name api.hubfusioncore.com.co;

    include /etc/nginx/ssl-params.conf;   # ver abajo

    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection keep-alive;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 90;
        proxy_cache_bypass $http_upgrade;
    }
}

# ── Admin app ─────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name admin.hubfusioncore.com.co;

    root  /var/www/admin-app;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache assets hasheados para siempre
    location ~* \.(js|css|woff2?|png|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# ── Salon app — wildcard *.hubfusioncore.com.co ───────────────────────
# IMPORTANTE: nginx evalúa server_name en orden de especificidad.
# api. y admin. se resuelven arriba; el wildcard captura todos los slugs.
server {
    listen 443 ssl;
    server_name *.hubfusioncore.com.co;

    root  /var/www/salon-app;
    index index.html;

    # SPA fallback — Angular Router maneja todas las rutas
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache assets hasheados para siempre
    location ~* \.(js|css|woff2?|png|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
