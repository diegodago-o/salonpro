<div class="app-layout" [class.sidebar-collapsed]="!sidebarOpen()">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <span class="logo-icon">✂</span>
      @if (sidebarOpen()) {
        <span class="logo-text">SalonPro</span>
      }
    </div>

    <nav class="sidebar-nav">
      @for (item of visibleNavItems; track item.route) {
        <a
          [routerLink]="item.route"
          routerLinkActive="active"
          class="nav-item"
          [title]="!sidebarOpen() ? item.label : ''"
        >
          <span class="nav-icon">{{ item.icon }}</span>
          @if (sidebarOpen()) {
            <span class="nav-label">{{ item.label }}</span>
          }
        </a>
      }
    </nav>

    <div class="sidebar-footer">
      <button class="toggle-btn" (click)="toggleSidebar()" [title]="sidebarOpen() ? 'Colapsar' : 'Expandir'">
        {{ sidebarOpen() ? '◀' : '▶' }}
      </button>
    </div>
  </aside>

  <!-- Main area -->
  <div class="main-area">

    <!-- Header -->
    <header class="top-header">
      <div class="header-left">
        @if (user()?.branchName) {
          <span class="branch-badge">📍 {{ user()?.branchName }}</span>
        }
      </div>

      <div class="header-right">
        <div class="user-info">
          <div class="user-avatar">{{ userInitials }}</div>
          @if (true) {
            <div class="user-details">
              <span class="user-name">{{ user()?.fullName }}</span>
              <span class="user-role">{{ user()?.role }}</span>
            </div>
          }
        </div>

        <button class="logout-btn" (click)="logout()" title="Cerrar sesión">
          🚪
        </button>
      </div>
    </header>

    <!-- Page content -->
    <main class="page-content">
      <router-outlet />
    </main>

  </div>
</div>
