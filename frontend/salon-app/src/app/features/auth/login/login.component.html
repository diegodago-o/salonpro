<div class="login-canvas fade-in">
  <!-- Left: art panel -->
  <div class="login-art">
    <div>
      <div class="brand-mark" style="color:var(--bone);font-size:28px">Salon<em>Pro</em></div>
      <div style="font-size:11px;color:var(--ink-5);text-transform:uppercase;letter-spacing:0.18em;margin-top:6px">Hair · Beauty · Lifestyle</div>
    </div>
    <div>
      <div class="serif" style="font-size:72px;font-weight:200;line-height:0.95;letter-spacing:-0.03em">
        El salón,<br/>
        <span class="serif-italic" style="color:var(--accent)">en orden.</span>
      </div>
      <div style="margin-top:24px;font-size:14px;color:var(--ink-5);max-width:380px;line-height:1.6">
        Punto de venta, comisiones, inventario y reportes. Una sola herramienta para correr tu salón.
      </div>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--ink-5);text-transform:uppercase;letter-spacing:0.14em">
      <span>v 2.4 · Colombia</span>
      <span>—</span>
      <span>2026</span>
    </div>
  </div>

  <!-- Right: form -->
  <div class="login-form-side">
    <div style="width:100%;max-width:360px">
      <div class="eyebrow">Acceso</div>
      <h1 class="serif" style="font-size:44px;font-weight:300;margin:4px 0 28px;letter-spacing:-0.02em">
        Inicia <span class="serif-italic">sesión</span>
      </h1>

      <form [formGroup]="form" (ngSubmit)="submit()">
        <label class="field" style="margin-bottom:14px">
          <span class="label">Correo</span>
          <input class="input" type="email" formControlName="email" placeholder="tu@salon.com" />
        </label>

        <label class="field" style="margin-bottom:18px">
          <span class="label">Contraseña</span>
          <input class="input" type="password" formControlName="password" placeholder="••••••••" />
        </label>

        @if (error()) {
          <div style="padding:10px 12px;background:var(--danger-soft);color:var(--danger);border-radius:6px;font-size:12px;margin-bottom:16px">
            {{ error() }}
          </div>
        }

        <button type="submit" class="btn btn-primary btn-lg" style="width:100%" [disabled]="loading()">
          @if (loading()) {
            Ingresando…
          } @else {
            Continuar <sp-icon name="arrow-right" [size]="14" />
          }
        </button>
      </form>

      <div style="margin-top:24px;font-size:12px;color:var(--ink-3);text-align:center">
        ¿Olvidaste tu contraseña?
      </div>
    </div>
  </div>
</div>
